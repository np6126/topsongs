name: topsongs
services:
  app:
    container_name: topsongs
    build:
      context: ${PROJECT_ROOT:-..}
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./state:/app/state
    healthcheck:
      test: ["CMD", "python", "-c", "import topsongs.cli"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
